services:
  - type: web
    name: vmmusic-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: mkdir -p .bin && curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o .bin/yt-dlp && chmod +x .bin/yt-dlp && npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: RESOLVE_CACHE_TTL_MS
        value: 600000
      - key: RESOLVE_BATCH_LIMIT
        value: 20
      - key: YTDLP_TIMEOUT_MS
        value: 20000
      - key: YTDLP_BINARY
        value: .bin/yt-dlp
      - key: STEMS_TIMEOUT_MS
        value: 720000
      - key: COVER_ANIMATION_TIMEOUT_MS
        value: 90000
